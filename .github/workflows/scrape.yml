# Weekly data refresh from lolalytics.
#
# Verify CLI matches scraper/README.md after scraper subagent finishes.
# Expected scraper CLI surface:
#   python scraper/scrape.py promote-finals
#   python scraper/scrape.py snapshot --patch current --lane all
#   python scraper/aggregate.py
# If the scraper subagent ships different command names, amend the run-steps below.

name: scrape

on:
  schedule:
    # Monday 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Cancel an in-flight scheduled run if a new one (cron OR manual) starts.
  # Keyed on workflow + ref so manual dispatches on branches don't collide
  # with the scheduled main-branch run by accident.
  group: scrape-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need a token that can push back to the repo; the default
          # GITHUB_TOKEN with `contents: write` is sufficient.
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # Cache the Playwright browser binaries (~300 MB) keyed on the
      # playwright version in requirements.txt. Saves ~1 minute per run.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/requirements.txt') }}

      - name: Install Playwright Chromium
        # --with-deps still needs to run for the system libs even when the
        # browser binaries are cached, but it's a no-op for the browser itself.
        run: python -m playwright install chromium --with-deps

      - name: Promote previous patch to is_final (if a new patch rolled out)
        run: python scraper/scrape.py promote-finals

      - name: Scrape current patch, all lanes
        run: python scraper/scrape.py snapshot --patch current --lane all

      - name: Rebuild weighted aggregates
        run: python scraper/aggregate.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          git add data/
          git commit -m "chore: data refresh $(date -u +%Y-%m-%d)"
          git push
