# Weekly data refresh from lolalytics.
#
# Transport: scrape_http.py — a stdlib-only (urllib) driver with a browser
# User-Agent and polite pacing. lolalytics's q-data.json endpoints serve fine
# to a normal client as long as requests aren't bursted; Cloudflare only
# challenges aggressive traffic. This path needs NO pip install and NO
# Chromium, so the job is fast.
#
# FALLBACK: if Cloudflare ever hard-blocks the GitHub runner IPs (symptom:
# scrape_http.py logs repeated 403 "Just a moment…" and writes no data), switch
# the scrape step to the Playwright transport instead:
#     - pip install -r scraper/requirements.txt
#     - python -m playwright install chromium --with-deps
#     - python scraper/scrape.py promote-finals
#     - python scraper/scrape.py snapshot --patch current --lane all
# scrape.py (Playwright) is kept in the repo for exactly this reason.

name: scrape

on:
  schedule:
    # Monday 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # scrape_http.py + aggregate.py + qwik_parser.py are all stdlib-only —
      # no dependency install required.

      - name: Scrape current patch, all lanes
        run: python scraper/scrape_http.py --lane all --min-pr 0.5

      - name: Rebuild weighted aggregates
        run: python scraper/aggregate.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          git add data/
          git commit -m "chore: data refresh $(date -u +%Y-%m-%d)"
          git push
