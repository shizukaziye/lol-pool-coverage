# GitHub Pages deploy.
#
# Deploy strategy: upload the repo root (minus scraper/, docs/, .github/, etc.)
# so `webapp/` and `data/` remain siblings. The webapp does relative fetches
# like `fetch('../data/weighted/top.json')`, which only works if both are
# served at the same origin under their existing paths.
#
# A one-line redirect index.html at the repo root sends visitors to
# /webapp/. So the public URL is e.g.
#   https://<user>.github.io/lol-pool-coverage/         -> redirects to
#   https://<user>.github.io/lol-pool-coverage/webapp/

name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - 'data/**'
      - 'index.html'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage Pages artifact
        # Copy only the files we want on the public site into _site/.
        # Keeps scraper sources, docs, and CI config off the public URL.
        run: |
          mkdir -p _site
          cp -R webapp _site/webapp
          if [ -d data ]; then
            cp -R data _site/data
          else
            # First-ever deploy before any scrape has run.
            # webapp gracefully falls back to its test fixture; ship an empty dir.
            mkdir -p _site/data
          fi
          if [ -f index.html ]; then
            cp index.html _site/index.html
          else
            # Fallback redirect if the root index.html ever goes missing.
            cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>lol-pool-coverage</title>
          <meta http-equiv="refresh" content="0; url=./webapp/">
          <link rel="canonical" href="./webapp/">
          <p>Redirecting to <a href="./webapp/">the app</a>&hellip;</p>
          HTML
          fi

      - name: Cache-bust code assets
        # GitHub Pages forces `Cache-Control: max-age=600` on static files, so
        # returning visitors keep stale JS/CSS for ~10 min after a deploy. Append
        # the commit SHA as ?v= to the entry assets AND the ES-module imports that
        # reference each other, so every deploy serves fresh code. Data .json
        # fetches are intentionally left untouched (they revalidate on their own).
        run: |
          V="${GITHUB_SHA::8}"
          cd _site/webapp
          sed -i -E "s#(src=\"app\.js)\"#\1?v=$V\"#; s#(href=\"style\.css)\"#\1?v=$V\"#" index.html
          sed -i -E "s#(from \"\./[a-zA-Z0-9_-]+\.js)\"#\1?v=$V\"#g" *.js
          echo "cache-busted with v=$V:"
          grep -nE "app\.js\?v=|style\.css\?v=" index.html || true
          grep -nE "from \"\./[a-zA-Z0-9_-]+\.js\?v=" *.js || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
